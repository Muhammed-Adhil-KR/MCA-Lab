<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Demonstration</title>
    <style>
        body{
            background: color #a9bed0;
            font-family: Arial, Helvetica, sans-serif;
            border: 2px;
            border-radius: 50%;
            border-color: darkgray;
        }
        p{
            color: #080582;
            font-size: 18px;
            line-height: 1.6;
            background-color: aquamarine;
            padding: 20px;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <h1 style="color:rgb(236, 190, 40); text-align: center; text-decoration: underline;">This is heading styled with Inline CSS</h1>

    <div style="padding-top:30px ;"></div>

    <p>This paragraph is styled using internal CSS with color and font setting</p>

    <div style="padding-top:30px ;"></div>

    <div class="box">This div is styled using external CSS</div>
</body>
</html>
