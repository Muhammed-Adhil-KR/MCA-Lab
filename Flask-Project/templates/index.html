{% extends "base.html" %}
{% block title %}BMI Calculator - Home{% endblock %}

{% block content %}

<div class="container">
    <h1>BMI Calculator</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/calculate" method="POST">

        <!-- Unit Selection -->
        <label for="unit"><b>Select Units:</b></label>
        <select name="unit" id="unit" onchange="toggleUnits()">
            <option value="metric">Metric (kg, cm)</option>
            <option value="imperial">Imperial (lbs, ft/in)</option>
        </select>

        <!-- Metric Fields -->
        <div id="metric-fields">
            <label><b>Weight (kg):</b></label>
            <input type="number" name="weight" step="0.1" required>

            <label><b>Height (cm):</b></label>
            <input type="number" name="height" step="0.1" required>
        </div>

        <!-- Imperial Fields -->
        <div id="imperial-fields" style="display:none;">
            <label><b>Weight (lbs):</b></label>
            <input type="number" name="weight" step="0.1">

            <label><b>Height (ft):</b></label>
            <input type="number" name="feet">

            <label><b>Height (in):</b></label>
            <input type="number" name="inches">
        </div>

        <button type="submit" class="btn">Calculate BMI</button>
    </form>
</div>

<script>
    function toggleUnits() {
        const unit = document.getElementById("unit").value;
        const metric = document.getElementById("metric-fields");
        const imperial = document.getElementById("imperial-fields");

        if (unit === "metric") {
            metric.style.display = "block";
            imperial.style.display = "none";
        } else {
            metric.style.display = "none";
            imperial.style.display = "block";
        }
    }
</script>

{% endblock %}
